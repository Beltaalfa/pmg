# Proxy HTTPS → Next.js PMG (127.0.0.1:3008).
# sudo cp /var/www/pmg/deploy/nginx-pmg.northempresarial.com.conf /etc/nginx/sites-available/pmg.northempresarial.com.conf
# sudo ln -sf /etc/nginx/sites-available/pmg.northempresarial.com.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# TLS: após o DNS apontar para este servidor:
#   sudo certbot --nginx -d pmg.northempresarial.com
# (ou inclua -d pmg.northempresarial.com num certificado existente de northempresarial.com)

server {
    server_name pmg.northempresarial.com;

    location /_next/ {
        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/northempresarial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/northempresarial.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = pmg.northempresarial.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name pmg.northempresarial.com;
    return 404;
}
